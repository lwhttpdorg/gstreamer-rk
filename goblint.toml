# Set minimum GLib version (disables rules that require newer versions)
min_glib_version = "2.64"

# Target MSVC-compatible code (disables g_auto* cleanup attributes)
# When true: enables no_g_auto_macros forbidding all usage of g_auto macros
msvc_compatible = true

# GStreamer makes use of GParamSpec nick and blurb
[rules.g_param_spec_null_nick_blurb]
level = "ignore"

# Temporarily ignored
[rules.include_order]
level = "ignore"

# Temporarily ignored
[rules.missing_implementation]
level = "ignore"
