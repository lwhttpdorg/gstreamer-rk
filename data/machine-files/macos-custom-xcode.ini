[constants]
xcode_path      = '/path/to/Xcode.app'
macosx_sdk      = xcode_path / 'Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk'
toolchain_path  = xcode_path / 'Contents/Developer/Toolchains/XcodeDefault.xctoolchain'
macosx_minver   = '10.13'
common_args     = ['-isysroot', macosx_sdk, '--sysroot=' + macosx_sdk, '-mmacosx-version-min=' + macosx_minver, '-F' + macosx_sdk / 'System/Library/Frameworks', '-isystem', macosx_sdk / 'usr/include']

[built-in options]
c_args              = common_args
cpp_args            = common_args
objc_args           = common_args
objcpp_args         = common_args
c_link_args         = common_args
cpp_link_args       = common_args
objc_link_args      = common_args
objcpp_link_args    = common_args
wrap_mode           = 'nodownload'

[project options]
ges = 'enabled'
rs = 'disabled'

[gst-plugins-base:project options]
gl = 'enabled'
gl_api = ['opengl']
gl_platform = ['cgl']
gl_winsys = ['cocoa']

[gst-plugins-bad:project options]
applemedia = 'enabled'
vulkan = 'enabled'

[gst-plugins-good:project options]
osxaudio = 'enabled'

[gst-devtools:project options]
dots_viewer = 'disabled'

[binaries]
c = toolchain_path / 'usr/bin/clang'
cpp = toolchain_path / 'usr/bin/clang++'
objc = toolchain_path / 'usr/bin/clang'
objcpp = toolchain_path / 'usr/bin/clang++'
qmake = 'false'
pkg-config = 'false'
cmake = 'false'
